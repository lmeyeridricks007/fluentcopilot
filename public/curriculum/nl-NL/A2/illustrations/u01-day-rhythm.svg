<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 120" role="img" aria-labelledby="t1">
  <title id="t1">Day rhythm: morning, afternoon, evening</title>
  <defs>
    <linearGradient id="sky" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#e0f2fe"/>
      <stop offset="100%" style="stop-color:#f8fafc"/>
    </linearGradient>
  </defs>
  <rect width="400" height="120" fill="url(#sky)" rx="8"/>
  <line x1="40" y1="85" x2="360" y2="85" stroke="#94a3b8" stroke-width="2"/>
  <circle cx="80" cy="85" r="8" fill="#f59e0b"/>
  <circle cx="200" cy="85" r="8" fill="#3b82f6"/>
  <circle cx="320" cy="85" r="8" fill="#6366f1"/>
  <text x="80" y="55" text-anchor="middle" font-family="system-ui,sans-serif" font-size="13" fill="#0f172a">ochtend</text>
  <text x="200" y="55" text-anchor="middle" font-family="system-ui,sans-serif" font-size="13" fill="#0f172a">middag</text>
  <text x="320" y="55" text-anchor="middle" font-family="system-ui,sans-serif" font-size="13" fill="#0f172a">avond</text>
  <text x="80" y="108" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" fill="#64748b">koffie</text>
  <text x="200" y="108" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" fill="#64748b">werk/studie</text>
  <text x="320" y="108" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" fill="#64748b">rust</text>
</svg>
